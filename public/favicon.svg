<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#080808"/>

  <!-- Board edge corner marks -->
  <polyline points="3,6 3,3 6,3" stroke="#c07a3f" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <polyline points="26,3 29,3 29,6" stroke="#c07a3f" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <polyline points="3,26 3,29 6,29" stroke="#c07a3f" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <polyline points="26,29 29,29 29,26" stroke="#c07a3f" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Copper traces from edges to centre via -->
  <line x1="3" y1="16" x2="9" y2="16" stroke="#c07a3f" stroke-width="1.5"/>
  <line x1="23" y1="16" x2="29" y2="16" stroke="#c07a3f" stroke-width="1.5"/>
  <line x1="16" y1="3" x2="16" y2="9" stroke="#c07a3f" stroke-width="1.5"/>
  <line x1="16" y1="23" x2="16" y2="29" stroke="#c07a3f" stroke-width="1.5"/>

  <!-- Central via — annular ring + drill hole fill -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#c07a3f" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#c07a3f" stroke-width="0.7" opacity="0.4"/>
  <circle cx="16" cy="16" r="2" fill="#c07a3f"/>

  <!-- Satellite vias at 45deg positions -->
  <circle cx="10" cy="10" r="2" fill="none" stroke="#c07a3f" stroke-width="1" opacity="0.65"/>
  <circle cx="10" cy="10" r="0.8" fill="#c07a3f" opacity="0.65"/>
  <circle cx="22" cy="10" r="2" fill="none" stroke="#c07a3f" stroke-width="1" opacity="0.65"/>
  <circle cx="22" cy="10" r="0.8" fill="#c07a3f" opacity="0.65"/>
  <circle cx="10" cy="22" r="2" fill="none" stroke="#c07a3f" stroke-width="1" opacity="0.65"/>
  <circle cx="10" cy="22" r="0.8" fill="#c07a3f" opacity="0.65"/>
  <circle cx="22" cy="22" r="2" fill="none" stroke="#c07a3f" stroke-width="1" opacity="0.65"/>
  <circle cx="22" cy="22" r="0.8" fill="#c07a3f" opacity="0.65"/>

  <!-- 45deg traces connecting satellites to centre -->
  <line x1="11.4" y1="11.4" x2="14.2" y2="14.2" stroke="#c07a3f" stroke-width="1" opacity="0.5"/>
  <line x1="20.6" y1="11.4" x2="17.8" y2="14.2" stroke="#c07a3f" stroke-width="1" opacity="0.5"/>
  <line x1="11.4" y1="20.6" x2="14.2" y2="17.8" stroke="#c07a3f" stroke-width="1" opacity="0.5"/>
  <line x1="20.6" y1="20.6" x2="17.8" y2="17.8" stroke="#c07a3f" stroke-width="1" opacity="0.5"/>
</svg>
